databases:
  - name: effafashion-db
    plan: free
    databaseName: effafashion
    user: effaadmin

services:
  # ── Backend API ──────────────────────────────────────────
  - type: web
    name: effafashion-api
    runtime: docker
    rootDir: effafashion-server
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: effafashion-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://effafashion-frontend.onrender.com
      - key: PORT
        value: 5000

  # ── Frontend Static Site ─────────────────────────────────
  - type: web
    name: effafashion-frontend
    runtime: static
    rootDir: effafashion-client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://effafashion-api.onrender.com/api
